<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 朱红印章底 -->
  <rect x="4" y="4" width="56" height="56" rx="3" ry="3" fill="#C23B22"/>
  <!-- 内框 -->
  <rect x="8" y="8" width="48" height="48" rx="1" ry="1" fill="none" stroke="#F5E6D0" stroke-width="2"/>
  <!-- "争"字 - 篆刻风格，米白色 -->
  <text x="32" y="47" text-anchor="middle" font-family="serif" font-weight="900" font-size="36" fill="#F5E6D0" letter-spacing="-2">争</text>
  <!-- 印章磨损纹理 -->
  <rect x="12" y="20" width="3" height="2" rx="1" fill="#C23B22" opacity="0.6"/>
  <rect x="45" y="38" width="4" height="2" rx="1" fill="#C23B22" opacity="0.5"/>
  <rect x="18" y="48" width="2" height="3" rx="1" fill="#C23B22" opacity="0.4"/>
</svg>
