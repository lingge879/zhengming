<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百家争鸣 · 诸子论道</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=chunqiu03" />
</head>
<body class="home-body">

  <main class="page">
    <div class="home-seal">论</div>

    <section class="home-header">
      <h1>百家争鸣</h1>
      <p>诸子论道，以辩明理</p>
    </section>

    <p class="cloud-divider">○ ○ ○</p>

    <section class="home-composer">
      <span class="home-composer-label">起论</span>
      <form method="post" action="/api/topics/start-session" class="home-composer-form" id="homeStartForm">
        <div class="home-agent-row">
          <div class="order-chips compact-order-chips" id="homeAgentChips">
            <button type="button" class="order-chip is-selected" data-agent="codex">
              <span class="order-index">1</span>
              <span>codex</span>
            </button>
            <button type="button" class="order-chip is-selected" data-agent="claudecode">
              <span class="order-index">2</span>
              <span>claudecode</span>
            </button>
          </div>
          <input type="hidden" name="agent_order" id="homeAgentOrder" value="codex,claudecode" />
        </div>

        <div class="home-input-stack">
          <textarea
            name="content"
            id="homeMessageInput"
            rows="5"
            placeholder="昔齐桓公问管仲：何以治天下？—— 抛出你的议题，诸子自来论之。"
            required
          ></textarea>
        </div>
        <div class="home-submit-row">
          <p class="home-hint">默认两位论者皆参与；点击上方可令其退席。</p>
          <button type="submit" class="primary-button home-submit">开讲</button>
        </div>
      </form>
    </section>

    <p class="cloud-divider">○ ○ ○</p>

    <section class="home-list">
      <div class="home-list-head">
        <h2>往期论题</h2>
      </div>
      {% if topics %}
      <div class="topic-list">
        {% for topic in topics %}
        <div class="topic-card-row">
          <a class="topic-card" href="/topics/{{ topic.slug }}">
            <strong>{{ topic.title }}</strong>
            <span>{{ topic.current_speaker }} &middot; 第 {{ topic.turn_no }} 轮</span>
            <span>{{ topic.updated_at }}</span>
          </a>
          <button class="delete-btn" data-slug="{{ topic.slug }}" title="删除此论题">✕</button>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <p class="muted">尚无论题，请于上方开启新局。</p>
      {% endif %}
    </section>
  </main>

  <script>
    var homeMessageInput = document.getElementById("homeMessageInput");
    var homeAgentOrder = document.getElementById("homeAgentOrder");
    var homeAgentChips = Array.from(document.querySelectorAll("#homeAgentChips .order-chip"));
    var selectionOrder = homeAgentChips.filter(function(c) { return c.classList.contains("is-selected"); }).slice();

    function resizeHomeComposer() {
      homeMessageInput.style.height = "0px";
      var nextHeight = Math.min(Math.max(homeMessageInput.scrollHeight, 128), 220);
      homeMessageInput.style.height = nextHeight + "px";
    }

    function syncHomeAgentSelection() {
      homeAgentChips.forEach(function(chip) {
        var idx = selectionOrder.indexOf(chip);
        chip.querySelector(".order-index").textContent = idx >= 0 ? String(idx + 1) : "\u00b7";
      });
      homeAgentOrder.value = selectionOrder.map(function(c) { return c.dataset.agent; }).join(",");
    }

    homeAgentChips.forEach(function(chip) {
      chip.addEventListener("click", function() {
        if (chip.classList.contains("is-selected")) {
          if (selectionOrder.length === 1) return;
          chip.classList.remove("is-selected");
          selectionOrder = selectionOrder.filter(function(c) { return c !== chip; });
        } else {
          chip.classList.add("is-selected");
          selectionOrder.push(chip);
        }
        syncHomeAgentSelection();
      });
    });

    homeMessageInput.addEventListener("input", resizeHomeComposer);
    resizeHomeComposer();
    syncHomeAgentSelection();

    document.querySelectorAll(".delete-btn").forEach(function(btn) {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        if (!confirm("确定要删除此论题？")) return;
        var slug = btn.dataset.slug;
        fetch("/api/topics/" + slug, { method: "DELETE" })
          .then(function(res) { if (res.ok) btn.closest(".topic-card-row").remove(); })
          .catch(function(err) { alert("删除失败：" + err.message); });
      });
    });
  </script>
</body>
</html>
