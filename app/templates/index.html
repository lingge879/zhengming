<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百家争鸣 · 诸子论道</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=chunqiu02" />
</head>
<body class="home-body">
  <main class="page">
    <section class="home-header">
      <h1>百家争鸣</h1>
      <p>诸子论道，以辩明理 —— 输入议题，诸子即刻开讲。</p>
    </section>

    <section class="home-composer">
      <form method="post" action="/api/topics/start-session" class="home-composer-form" id="homeStartForm">
        <div class="home-agent-row">
          <div class="order-chips compact-order-chips" id="homeAgentChips">
            <button type="button" class="order-chip is-selected" data-agent="codex">
              <span class="order-index">1</span>
              <span>codex</span>
            </button>
            <button type="button" class="order-chip is-selected" data-agent="claudecode">
              <span class="order-index">2</span>
              <span>claudecode</span>
            </button>
          </div>
          <input type="hidden" name="agent_order" id="homeAgentOrder" value="codex,claudecode" />
        </div>

        <div class="home-input-stack">
          <textarea
            name="content"
            id="homeMessageInput"
            rows="5"
            placeholder="例如：cq4 四步法现在太复杂，怎么把本体构建流程收敛成一个更容易推进的方案？"
            required
          ></textarea>
        </div>
        <div class="home-submit-row">
          <p class="home-hint">默认两位论者皆参与；点击上方可令其退席。</p>
          <button type="submit" class="primary-button home-submit">开讲</button>
        </div>
      </form>
    </section>

    <section class="home-list">
      <div class="home-list-head">
        <h2>往期论题</h2>
      </div>
      {% if topics %}
      <div class="topic-list">
        {% for topic in topics %}
        <a class="topic-card" href="/topics/{{ topic.slug }}">
          <strong>{{ topic.title }}</strong>
          <span>{{ topic.current_speaker }} \u00b7 第 {{ topic.turn_no }} 轮</span>
          <span>{{ topic.updated_at }}</span>
        </a>
        {% endfor %}
      </div>
      {% else %}
      <p class="muted">尚无论题，请于上方开启新局。</p>
      {% endif %}
    </section>
  </main>

  <script>
    const homeMessageInput = document.getElementById("homeMessageInput");
    const homeAgentOrder = document.getElementById("homeAgentOrder");
    const homeAgentChips = Array.from(document.querySelectorAll("#homeAgentChips .order-chip"));

    function resizeHomeComposer() {
      homeMessageInput.style.height = "0px";
      const nextHeight = Math.min(Math.max(homeMessageInput.scrollHeight, 128), 220);
      homeMessageInput.style.height = `${nextHeight}px`;
    }

    function syncHomeAgentSelection() {
      const selected = homeAgentChips.filter((chip) => chip.classList.contains("is-selected"));
      homeAgentChips.forEach((chip, index) => {
        chip.querySelector(".order-index").textContent = chip.classList.contains("is-selected")
          ? String(selected.indexOf(chip) + 1)
          : "\u00b7";
      });
      homeAgentOrder.value = selected.map((chip) => chip.dataset.agent).join(",");
    }

    homeAgentChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        const selected = homeAgentChips.filter((node) => node.classList.contains("is-selected"));
        if (chip.classList.contains("is-selected") && selected.length === 1) return;
        chip.classList.toggle("is-selected");
        syncHomeAgentSelection();
      });
    });

    homeMessageInput.addEventListener("input", resizeHomeComposer);
    resizeHomeComposer();
    syncHomeAgentSelection();
  </script>
</body>
</html>
